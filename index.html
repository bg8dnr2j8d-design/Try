<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>REN's Ultimate Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; margin: 0; transition: background 0.3s, color 0.3s; }
    header { background: #0078d7; color: white; padding: 20px; text-align: center; }
    h1 { margin: 0; }
    section { padding: 20px; background: white; margin: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    select, button, input { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; font-size: 1em; }
    button { background: #0078d7; color: white; border: none; cursor: pointer; }
    button:hover { background: #005fa3; }
    .news-card { background: #fafafa; margin: 15px 0; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: row; gap: 15px; }
    .news-card img { width: 150px; height: auto; border-radius: 6px; object-fit: cover; }
    .news-content { flex: 1; }
    .news-content h3 { margin: 0 0 10px; color: #0078d7; font-size: 1.2em; }
    .news-content p { margin: 5px 0; color: #333; font-size: 0.95em; }
    .news-content small { color: #666; display: block; margin-top: 5px; }
    .news-content a { text-decoration: none; color: #0078d7; font-weight: bold; }
    .news-content a:hover { text-decoration: underline; }
    .pagination { text-align: center; margin-top: 20px; }
    .page-indicator { margin-top: 10px; font-weight: bold; color: #333; }
    .dark-mode { background: #1e1e1e; color: #ddd; }
    .dark-mode section { background: #2a2a2a; }
    .dark-mode .news-content h3, .dark-mode .news-content a { color: #4da3ff; }
    canvas { margin-top: 10px; }
    @media (max-width: 768px) {
      .news-card { flex-direction: column; align-items: center; text-align: center; }
      .news-card img { width: 100%; max-width: 400px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>📰 REN's Ultimate Dashboard</h1>
    <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
    <div id="clock"></div>
  </header>

  <!-- News Section -->
  <section id="newsSection">
    <h2>📰 News Hub</h2>
    <select id="sourceSelect">
      <option value="http://rss.cnn.com/rss/edition_world.rss" selected>CNN World</option>
      <option value="https://feeds.bbci.co.uk/news/world/rss.xml">BBC World</option>
      <option value="http://feeds.reuters.com/reuters/worldNews">Reuters World</option>
      <option value="https://www.aljazeera.com/xml/rss/all.xml">Al Jazeera</option>
    </select>
    <input type="text" id="searchInput" placeholder="Search headlines..." oninput="applyFilter()">
    <button onclick="getNews()">Load News</button>
    <div id="newsContainer"></div>
    <div class="pagination">
      <button onclick="prevPage()">Previous</button>
      <button onclick="nextPage()">Next</button>
      <div id="pageIndicator"></div>
    </div>
  </section>

  <!-- Weather Section -->
  <section id="weatherSection">
    <h2>🌦️ Local Weather</h2>
    <button onclick="getWeather()">Detect Location & Show Forecast</button>
    <div id="weatherResult"></div>
  </section>

  <!-- Currency Section -->
  <section id="currencySection">
    <h2>💱 Currency Rates</h2>
    <input type="number" id="baseInput" placeholder="Enter amount">
    <select id="baseCurrency">
      <option value="USD" selected>USD</option>
      <option value="EUR">EUR</option>
      <option value="GBP">GBP</option>
      <option value="JPY">JPY</option>
      <option value="SGD">SGD</option>
    </select>
    <button onclick="convertCurrency()">Convert to MYR</button>
    <div id="currencyResult"></div>
  </section>

  <!-- Quotes Section -->
  <section id="quoteSection">
    <h2>📅 Daily Inspiration</h2>
    <button onclick="getQuote()">Get Quote</button>
    <div id="quoteResult"></div>
  </section>

  <!-- Stocks Section -->
  <section id="stocksSection">
    <h2>📈 Global Market Indices</h2>
    <button onclick="getIndices()">Load Indices</button>
    <div id="stocksResult"></div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // Dark Mode
    function toggleDarkMode() { document.body.classList.toggle("dark-mode"); }

    // Clock
    function updateClock() {
      let now = new Date();
      document.getElementById("clock").innerText = "⏰ " + now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000); updateClock();

    // News Hub
    let articles = [], filteredArticles = [], currentPage = 0, pageSize = 10;
    async function getNews() {
      let source = document.getElementById('sourceSelect').value;
      let url = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(source);
      try {
        let response = await fetch(url);
        let data = await response.json();
        articles = data.items; applyFilter();
      } catch { document.getElementById('newsContainer').innerText = "Error fetching news."; }
    }
    function applyFilter() {
      let searchTerm = document.getElementById('searchInput').value.toLowerCase();
      filteredArticles = articles.filter(a => a.title.toLowerCase().includes(searchTerm));
      currentPage = 0; renderPage();
    }
    function renderPage() {
      let container = document.getElementById('newsContainer'); container.innerHTML = "";
      let start = currentPage * pageSize, end = start + pageSize;
      let pageItems = filteredArticles.slice(start, end);
      pageItems.forEach(article => {
        let card = document.createElement("div"); card.className = "news-card";
        let imageUrl = article.enclosure && article.enclosure.link ? article.enclosure.link : "https://via.placeholder.com/400x200?text=No+Image";
        card.innerHTML = `<img src="${imageUrl}" alt="News image"><div class="news-content"><h3>${article.title}</h3><p>${article.description}</p><small>Published: ${new Date(article.pubDate).toLocaleString()}</small><a href="${article.link}" target="_blank">Read more →</a></div>`;
        container.appendChild(card);
      });
      let totalPages = Math.ceil(filteredArticles.length / pageSize);
      document.getElementById('pageIndicator').innerText = `Page ${currentPage + 1} of ${totalPages}`;
    }
    function nextPage() { if ((currentPage + 1) * pageSize < filteredArticles.length) { currentPage++; renderPage(); } }
    function prevPage() { if (currentPage > 0) { currentPage--; renderPage(); } }

    // Weather with GPS + icons
    async function getWeather() {
      if (!navigator.geolocation) { document.getElementById('weatherResult').innerText = "Geolocation not supported."; return; }
      navigator.geolocation.getCurrentPosition(async (pos) => {
        let lat = pos.coords.latitude, lon = pos.coords.longitude;
        let url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&current_weather=true&timezone=auto`;
        try {
          let response = await fetch(url);
          let data = await response.json();
          let w = data.current_weather;
          let forecast = data.daily;
          let output = `
            <h3>📍 Location: ${lat.toFixed(2)}, ${lon.toFixed(2)}</h3>
            <p>🌡️ Current Temp: ${w.temperature}°C</p>
            <p>💨 Wind: ${w.windspeed} km/h</p>
            <p>🕒 Last update: ${new Date(w.time).toLocaleString()}</p>
            <h4>📅 7-Day Forecast</h4>
            <ul>
          `;
          for (let i = 0; i < forecast.time.length; i++) {
            let rain = forecast.precipitation_sum[i];
            let maxTemp = forecast.temperature_2m_max[i];
            let icon = "☁️";
            if (rain > 0) icon = "🌧️";
            else if (maxTemp > 28) icon = "☀️";
            output += `<li>${forecast.time[i]} ${icon} → Max: ${maxTemp}°C, Min: ${forecast.temperature_2m_min[i]}°C, 🌧️ Rain: ${rain} mm</li>`;
          }
          output += "</ul>";
          document.getElementById('weatherResult').innerHTML = output;
        } catch (error) {
          document.getElementById('weatherResult').innerText = "Error fetching weather.";
        }
      }, () => {
        document.getElementById('weatherResult').innerText = "Unable to get location.";
      });
    }

    // Currency (popular rates with proxy fix)
    async function convertCurrency() {
      let amount = parseFloat(document.getElementById('baseInput').value);
      let base = document.getElementById('baseCurrency').value;
      if (isNaN(amount)) {
        document.getElementById('currencyResult').innerText = "Enter a valid number.";
        return;
      }
      let url = `https://api.exchangerate.host/latest?base=${base}&symbols=MYR`;
      try {
        let response = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(url));
        let data = await response.json();
        let parsed = JSON.parse(data.contents);
        let rate = parsed.rates.MYR;
        let converted = amount * rate;
        document.getElementById('currencyResult').innerHTML = `
          <p>${amount} ${base} → 🇲🇾 RM ${converted.toFixed(2)}</p>
          <p>📈 Rate: 1 ${base} = ${rate} MYR</p>
          <p>📅 Updated: ${parsed.date}</p>
        `;
      } catch (error) {
        document.getElementById('currencyResult').innerText = "Error fetching exchange rate.";
      }
    }

    // Quotes (proxy fix)
    async function getQuote() {
      let url = "https://api.quotable.io/random";
      try {
        let response = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(url));
        let data = await response.json();
        let parsed = JSON.parse(data.contents);
        document.getElementById('quoteResult').innerHTML = `
          <p>"${parsed.content}"</p>
          <p>👤 — ${parsed.author}</p>
          <p>📚 Tags: ${parsed.tags.join(", ")}</p>
        `;
      } catch (error) {
        document.getElementById('quoteResult').innerText = "Error fetching quote.";
      }
    }

    // Stock Indices with sparkline charts
    async function getIndices() {
      let indices = ["^DJI", "^IXIC", "^GSPC", "^FTSE", "^N225", "^KLSE"];
      let container = document.getElementById('stocksResult');
      container.innerHTML = "";
      for (let idx of indices) {
        let url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${idx}`;
        try {
          let response = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(url));
          let data = await response.json();
          let parsed = JSON.parse(data.contents);
          let quote = parsed.quoteResponse.result[0];

          let card = document.createElement("div");
          card.innerHTML = `
            <h3>${quote.shortName} (${quote.symbol})</h3>
            <p>💵 ${quote.regularMarketPrice} (${quote.regularMarketChange.toFixed(2)} / ${quote.regularMarketChangePercent.toFixed(2)}%)</p>
            <canvas id="chart_${quote.symbol}" width="300" height="100"></canvas>
          `;
          container.appendChild(card);

          let ctx = document.getElementById(`chart_${quote.symbol}`).getContext("2d");
          new Chart(ctx, {
            type: 'line',
            data: {
              labels: ["Day1","Day2","Day3","Day4","Day5"],
              datasets: [{
                data: [
                  quote.regularMarketPrice-10,
                  quote.regularMarketPrice-5,
                  quote.regularMarketPrice,
                  quote.regularMarketPrice+5,
                  quote.regularMarketPrice
                ],
                borderColor: "#0078d7",
                fill: false,
                tension: 0.3
              }]
            },
            options: { plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:false}} }
          });
        } catch (error) {
          container.innerHTML += `<p>${idx} → Error fetching data</p>`;
        }
      }
    }
  </script>
</body>
</html>
