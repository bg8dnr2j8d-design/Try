<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Super App Online Functions</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; }
    nav { background: #222; color: white; padding: 15px; text-align: center; }
    nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
    section { padding: 20px; background: white; margin: 20px; border-radius: 8px; }
    h2 { margin-top: 0; }
    input, button { padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
    button { background: #0078d7; color: white; border: none; cursor: pointer; }
    button:hover { background: #005fa3; }
    #weatherResult, #liveCurrencyResult { font-weight: bold; margin-top: 10px; }
    ul { list-style-type: none; padding: 0; }
    li { padding: 5px; border-bottom: 1px solid #ddd; }
  </style>
</head>
<body>
  <nav>
    <a href="#weather">Weather</a>
    <a href="#liveCurrency">Live FX</a>
    <a href="#newsAPI">News</a>
  </nav>

  <!-- Weather API -->
  <section id="weather">
    <h2>🌦️ Weather (Open-Meteo)</h2>
    <button onclick="getWeather()">Get Kuala Lumpur Weather</button>
    <div id="weatherResult"></div>
  </section>

  <!-- Live Currency API -->
  <section id="liveCurrency">
    <h2>💱 Live Currency Converter</h2>
    <input type="number" id="usdLive" placeholder="USD">
    <button onclick="convertLive()">Convert to MYR</button>
    <div id="liveCurrencyResult"></div>
  </section>

  <!-- News API -->
  <section id="newsAPI">
    <h2>📰 Latest News (BBC RSS)</h2>
    <button onclick="getNews()">Get Headlines</button>
    <ul id="newsList"></ul>
  </section>

  <script>
    // Weather (Open-Meteo, no key)
    async function getWeather() {
      let url = "https://api.open-meteo.com/v1/forecast?latitude=3.14&longitude=101.69&current_weather=true";
      try {
        let response = await fetch(url);
        let data = await response.json();
        let temp = data.current_weather.temperature;
        let wind = data.current_weather.windspeed;
        document.getElementById('weatherResult').innerText = `Temp: ${temp}°C | Wind: ${wind} km/h`;
      } catch (error) {
        document.getElementById('weatherResult').innerText = "Error fetching weather.";
      }
    }

    // Currency (ExchangeRate.host, no key)
    async function convertLive() {
      let usd = parseFloat(document.getElementById('usdLive').value);
      if (isNaN(usd)) {
        document.getElementById('liveCurrencyResult').innerText = "Enter a valid number.";
        return;
      }
      let url = "https://api.exchangerate.host/latest?base=USD&symbols=MYR";
      try {
        let response = await fetch(url);
        let data = await response.json();
        let rate = data.rates.MYR;
        let myr = usd * rate;
        document.getElementById('liveCurrencyResult').innerText = `MYR: RM ${myr.toFixed(2)} (Rate: ${rate})`;
      } catch (error) {
        document.getElementById('liveCurrencyResult').innerText = "Error fetching exchange rate.";
      }
    }

    // News (BBC RSS feed, no key)
    async function getNews() {
      let url = "https://feeds.bbci.co.uk/news/world/rss.xml";
      try {
        let response = await fetch(url);
        let text = await response.text();
        let parser = new DOMParser();
        let xml = parser.parseFromString(text, "application/xml");
        let items = xml.querySelectorAll("item");
        let list = document.getElementById('newsList');
        list.innerHTML = "";
        items.forEach((item, index) => {
          if (index < 5) {
            let li = document.createElement("li");
            li.innerHTML = `<a href="${item.querySelector("link").textContent}" target="_blank">${item.querySelector("title").textContent}</a>`;
            list.appendChild(li);
          }
        });
      } catch (error) {
        document.getElementById('newsList').innerText = "Error fetching news.";
      }
    }
  </script>
</body>
</html>
