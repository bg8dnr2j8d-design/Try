<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>News Fetcher</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 20px; }
    h2 { color: #0078d7; }
    button { padding: 10px; background: #0078d7; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #005fa3; }
    ul { list-style-type: none; padding: 0; }
    li { margin: 8px 0; }
    a { text-decoration: none; color: #333; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h2>📰 Latest News (BBC World)</h2>
  <button onclick="getNews()">Get Headlines</button>
  <ul id="newsList"></ul>

  <script>
    async function getNews() {
      let url = "https://feeds.bbci.co.uk/news/world/rss.xml";
      try {
        let response = await fetch(url);
        let text = await response.text();
        let parser = new DOMParser();
        let xml = parser.parseFromString(text, "application/xml");
        let items = xml.querySelectorAll("item");
        let list = document.getElementById('newsList');
        list.innerHTML = "";
        items.forEach((item, index) => {
          if (index < 5) { // show top 5 headlines
            let li = document.createElement("li");
            li.innerHTML = `<a href="${item.querySelector("link").textContent}" target="_blank">${item.querySelector("title").textContent}</a>`;
            list.appendChild(li);
          }
        });
      } catch (error) {
        document.getElementById('newsList').innerText = "Error fetching news.";
      }
    }
  </script>
</body>
</html>
